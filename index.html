<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Herotel Wi-Fi</title>

<style>
body{
    font-family: 'Segoe UI', Arial;
    background:#f4f6f9;
    margin:0;
}

/* HEADER */
.header{
    background:white;
    padding:15px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px solid #eee;
}

.logo{
    height:30px;
}

.hotspot-id{
    font-weight:bold;
    color:#333;
}

/* MAIN */
.container{
    max-width:420px;
    margin:auto;
    padding:15px;
}

/* STATUS CARD */
.status-card{
    background:#111;
    color:white;
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;
}

.status-row{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

.badge{
    background:#ff4d4d;
    padding:4px 10px;
    border-radius:20px;
    font-size:12px;
}

/* SECTION */
.card{
    background:white;
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

/* INPUT */
.input{
    width:100%;
    padding:14px;
    border-radius:10px;
    border:1px solid #ddd;
    margin-top:10px;
}

/* BUTTON */
.btn{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#f26522;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* TIME BLOCKS */
.time{
    display:flex;
    justify-content:space-between;
}

.time-box{
    background:#f3e1d7;
    padding:15px;
    border-radius:10px;
    text-align:center;
    width:30%;
    font-weight:bold;
}

/* PRICES */
.price-item{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
    align-items:center;
}

.price-tag{
    background:#e0f0e9;
    padding:8px 12px;
    border-radius:8px;
    font-weight:bold;
}

/* ADVERT */
.ad{
    background:linear-gradient(135deg,#f26522,#ff8a4c);
    color:white;
    border-radius:12px;
    padding:15px;
}

.ad a{
    display:inline-block;
    margin-top:10px;
    background:white;
    color:#f26522;
    padding:10px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

/* HELP */
.help{
    font-size:14px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="images/herotel-logo.png" class="logo">
    <div class="hotspot-id">Hotspot</div>
</div>

<div class="container">

<!-- STATUS -->
<div class="status-card">
    <div class="status-row">
        <div>Connection Status</div>
        <div class="badge">Offline</div>
    </div>
    <div>Device: $CLIENT_MAC$</div>
</div>

<!-- VOUCHER -->
<div class="card">
    <h3>Voucher Access</h3>

    <form method="GET" action="$PORTAL_ACTION$">
        <input class="input" type="text" name="voucher" placeholder="Enter Voucher Code" required>

        <input type="hidden" name="clientMac" value="$CLIENT_MAC$">
        <input type="hidden" name="apMac" value="$AP_MAC$">
        <input type="hidden" name="ssidName" value="$SSID$">
        <input type="hidden" name="redirectUrl" value="$REDIRECT_URL$">

        <button class="btn">Load Voucher</button>
    </form>
</div>

<!-- TIME -->
<div class="card">
    <h3>Time Remaining</h3>
    <div class="time">
        <div class="time-box">00<br>Days</div>
        <div class="time-box">00<br>Hours</div>
        <div class="time-box">00<br>Min</div>
    </div>
</div>

<!-- PRICES -->
<div class="card">
    <h3>Prices</h3>

    <div class="price-item">
        <div>1 Hour</div>
        <div class="price-tag">R2</div>
    </div>

    <div class="price-item">
        <div>24 Hours</div>
        <div class="price-tag">R5</div>
    </div>

    <div class="price-item">
        <div>7 Days</div>
        <div class="price-tag">R30</div>
    </div>

    <div class="price-item">
        <div>30 Days</div>
        <div class="price-tag">R120</div>
    </div>

    <button class="btn" onclick="buy()">Buy Voucher</button>
</div>

<!-- ADVERT -->
<div class="card ad">
    <h3>Upgrade to Fibre 🚀</h3>
    <p>Get fast, uncapped fibre internet for your home.</p>
    <a href="https://herotel.com/" target="_blank">View Herotel Deals</a>
</div>

<!-- HELP -->
<div class="card help">
    <strong>Need help?</strong><br>
    WhatsApp support available
</div>

</div>

<script>
function buy(){
    fetch("http://192.168.1.10:7144/api/payment/create-checkout", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ amount: 500 })
    })
    .then(res=>res.json())
    .then(data=>{
        if(data.redirectUrl){
            window.location.href = data.redirectUrl;
        }
    });
}
</script>

</body>
</html>
